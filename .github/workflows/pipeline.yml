name: ANDP Pipeline

# Dogfooding: the ANDP repo runs its own reusable release workflow
# against the bundled example app (examples/meeshy).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-publish:
    uses: ./.github/workflows/andp-release.yml
    with:
      scheme: Meeshy
      app-dir: examples/meeshy
      upload: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit
