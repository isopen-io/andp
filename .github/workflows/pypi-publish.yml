name: Publish to PyPI

# Publishes the andp package to PyPI via Trusted Publishing (OIDC) — no API
# token stored in the repo. Runs when a GitHub Release is published, or manually.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   add a "pending publisher" — PyPI project: andp, owner: isopen-io,
#   repository: andp, workflow: pypi-publish.yml, environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/andp
    permissions:
      id-token: write   # OIDC token for Trusted Publishing — the only credential
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
