# ANDP Secrets Template
# Rename this to secrets.yml and fill in the values.
# DO NOT COMMIT secrets.yml to version control.

apple_id:
  username: "your-email@example.com"
  password: "app-specific-password" # For iTMSTransporter if needed

asc_api:
  key_id: "ABCDE12345"
  issuer_id: "69a6dead-beef-4de4-8344-0123456789ab"
  key_content: |
    -----BEGIN PRIVATE KEY-----
    YOUR_KEY_CONTENT_HERE
    -----END PRIVATE KEY-----

signing:
  development_team: "TEAMID123"
  code_sign_identity: "Apple Distribution"
  provisioning_profiles:
    me.meeshy.app: "Meeshy_AppStore"
    me.meeshy.app.widgets: "Meeshy_Widgets_AppStore"
