# ANDP Secrets Template
# Rename this to secrets.yml and fill in the values.
# DO NOT COMMIT secrets.yml to version control.

# Support for multiple accounts/teams
accounts:
  primary:
    apple_id:
      username: "primary-email@example.com"
      password: "app-specific-password"
    asc_api:
      key_id: "ABCDE12345"
      issuer_id: "69a6dead-beef-4de4-8344-0123456789ab"
      key_content: |
        -----BEGIN PRIVATE KEY-----
        PRIMARY_KEY_CONTENT
        -----END PRIVATE KEY-----
    signing:
      development_team: "TEAMID_PRI"
      code_sign_identity: "Apple Distribution"
      provisioning_profiles:
        me.meeshy.app: "Meeshy_AppStore_Primary"
        me.meeshy.app.widgets: "Meeshy_Widgets_AppStore_Primary"

  secondary:
    apple_id:
      username: "secondary-email@example.com"
      password: "app-specific-password"
    asc_api:
      key_id: "VWXYZ67890"
      issuer_id: "f00baa-dead-beef-8344-0123456789ab"
      key_content: |
        -----BEGIN PRIVATE KEY-----
        SECONDARY_KEY_CONTENT
        -----END PRIVATE KEY-----
    signing:
      development_team: "TEAMID_SEC"
      code_sign_identity: "Apple Distribution"
      provisioning_profiles:
        me.meeshy.app: "Meeshy_AppStore_Secondary"
        me.meeshy.app.widgets: "Meeshy_Widgets_AppStore_Secondary"
